<!DOCTYPE html> 
<html> 
<head> 
<title>Dynamic Content using DOM</title> 
</head> 
<body> 
<h2 id="heading">Welcome</h2> 
<button onclick="changeContent()">Click Me</button> 
<script> 
function changeContent() { 
document.getElementById("heading").innerHTML = "Hello Sarthak! Content Changed 
Dynamically"; 
} 
</script> 
</body> 
</html>
