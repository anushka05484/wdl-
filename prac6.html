<!DOCTYPE html>  
<html> 
<head> 
<title> Detailed Form Validation</title> 
<style> 
body {font-family: Arial; } 
.error {color: red; } 
</style> 
<script> 
function validateForm() { 
let name = document.getElementByld("name"). value.trim(); 
let email = document.getElementByld("email"). value.trim(); 
let password = document.getElementByld("password"). value.trim(); 
let error = document.getElementByld("error"); 
error.innerHTML = ""; 
// Empty validation 
if (name === '' | email === '' | password ==='') { 
error.innerHTML = "All fields are required!"; 
return false; 
} 
// Email validation 
let pattern = /^[^]+@[^]+\.[a-z]{2,3}$/; 
if (!pattern.test(email)) { 
error.innerHTML = "Invalid email format!"; 
return false; 
} 
// Password validation 
if (password.length < 6 ) { 
error.innerHTML = "Password must be at least 6 characters!"; 
return false; 
} 
alert("Form submitted successfully!") 
return true; 
} 
</script> 
</head> 
<body> 
<h2> Registration Form</h2> 
<form onsubmit="return validateForm()"> 
Name: <br> 
<input type="text" id="name"><br><br> 
Email: <br> 
<input type="text" id="email"><br><br> 
Password: <br> 
<input type="password" id="password"><br><br> 
<input type="submit" value="Submit"> 
</form> 
<p id="error" class="error"></p> 
</body> 
</html>
